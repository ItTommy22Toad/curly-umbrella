<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 98 Media Player - Fullscreen</title>
    <style>
        /* Windows 98 Fullscreen Styling */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: #c0c0c0;
            font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
            font-size: 12px;
            overflow: hidden; /* Prevents page scrolling */
        }

        .win98-window {
            background-color: #c0c0c0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 4px;
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
        }

        /* Menu Bar */
        .menu-bar {
            display: flex;
            padding: 2px 4px;
            margin-bottom: 4px;
            align-items: center;
        }

        .menu-item {
            padding: 2px 6px;
            cursor: default;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background-color: #000080;
            color: #ffffff;
        }

        .upload-hint {
            margin-left: 10px;
            color: #000080;
            font-weight: bold;
            font-style: italic;
        }

        /* Media Screen */
        .screen-container {
            background-color: #000000;
            flex-grow: 1; /* Makes the screen fill all available vertical space */
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            margin: 0 4px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        .audio-message {
            position: absolute;
            color: #ffffff;
            font-family: 'MS Sans Serif', Tahoma, sans-serif;
            font-size: 14px;
            text-align: center;
            padding: 20px;
            display: none;
            line-height: 1.5;
        }

        /* Controls Section */
        .controls-container {
            padding: 10px 4px 4px 4px;
        }

        /* Sliders */
        .progress-wrapper {
            margin-bottom: 12px;
            padding: 0 4px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 20px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 12px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #000000 #000000 #dfdfdf;
            margin-top: -4px;
            cursor: pointer;
        }

        .progress-bar {
            width: 100%;
        }

        .vol-slider {
            width: 80px;
            margin-left: 4px;
        }

        /* Buttons and Time Display */
        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .buttons {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        button, select {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #000000 #000000 #ffffff;
            padding: 4px 10px;
            font-size: 12px;
            font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
        }

        select {
            padding: 2px 4px;
            margin: 0 4px;
        }

        button:active {
            border-color: #000000 #ffffff #ffffff #000000;
            padding: 5px 9px 3px 11px;
        }

        .time-display {
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 4px 8px;
            background-color: #c0c0c0;
            font-family: monospace;
            font-size: 12px;
            min-width: 90px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="win98-window">
        <div class="menu-bar">
            <div class="menu-item" id="fileMenuBtn"><u>F</u>ile</div>
            <span class="upload-hint">&lt;-- upload a video to play</span>
            <input type="file" id="fileInput" accept="video/*, audio/*" style="display: none;">
        </div>

        <div class="screen-container">
            <video id="mediaPlayer" src=""></video>
            <div class="audio-message" id="audioMessage">
                This is an audio file, audio files won't play video unless audio file have an art cover
            </div>
        </div>

        <div class="controls-container">
            <div class="progress-wrapper">
                <input type="range" id="progressBar" class="progress-bar" value="0" min="0" step="0.1">
            </div>
            
            <div class="bottom-controls">
                <div class="buttons">
                    <button id="playBtn" title="Play">▶</button>
                    <button id="pauseBtn" title="Pause">⏸</button>
                    <button id="stopBtn" title="Stop">⏹</button>
                    <button id="rewindBtn" title="Rewind 5s">⏪</button>
                    <button id="forwardBtn" title="Forward 5s">⏩</button>
                    
                    <select id="speedControl" title="Playback Speed">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>

                    <button id="muteBtn" title="Mute/Unmute">🔊</button>
                    <input type="range" id="volumeSlider" class="vol-slider" min="0" max="1" step="0.05" value="1" title="Volume">
                </div>
                
                <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
            </div>
        </div>
    </div>

    <script>
        const fileMenuBtn = document.getElementById('fileMenuBtn');
        const fileInput = document.getElementById('fileInput');
        const mediaPlayer = document.getElementById('mediaPlayer');
        const audioMessage = document.getElementById('audioMessage');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        
        const speedControl = document.getElementById('speedControl');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');

        // 1. File Upload Logic
        fileMenuBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const objectURL = URL.createObjectURL(file);
            mediaPlayer.src = objectURL;

            // Check if it's an audio file
            if (file.type.startsWith('audio/')) {
                audioMessage.style.display = 'block';
            } else {
                audioMessage.style.display = 'none';
            }

            // Reset UI states for new file
            mediaPlayer.playbackRate = parseFloat(speedControl.value);
            mediaPlayer.volume = volumeSlider.value;
            mediaPlayer.play();
        });

        // 2. Playback Controls
        playBtn.addEventListener('click', () => mediaPlayer.play());
        pauseBtn.addEventListener('click', () => mediaPlayer.pause());
        
        stopBtn.addEventListener('click', () => {
            mediaPlayer.pause();
            mediaPlayer.currentTime = 0;
        });

        rewindBtn.addEventListener('click', () => {
            mediaPlayer.currentTime = Math.max(0, mediaPlayer.currentTime - 5);
        });

        forwardBtn.addEventListener('click', () => {
            mediaPlayer.currentTime = Math.min(mediaPlayer.duration, mediaPlayer.currentTime + 5);
        });

        // 3. Speed & Volume Controls
        speedControl.addEventListener('change', (e) => {
            mediaPlayer.playbackRate = parseFloat(e.target.value);
        });

        volumeSlider.addEventListener('input', (e) => {
            mediaPlayer.volume = e.target.value;
            if (mediaPlayer.volume > 0) {
                mediaPlayer.muted = false;
                muteBtn.style.color = '#000000';
            }
        });

        muteBtn.addEventListener('click', () => {
            mediaPlayer.muted = !mediaPlayer.muted;
            if (mediaPlayer.muted) {
                muteBtn.style.color = '#808080';
                volumeSlider.value = 0;
            } else {
                muteBtn.style.color = '#000000';
                // Restore volume to a default if it was at 0
                if (mediaPlayer.volume === 0) mediaPlayer.volume = 1;
                volumeSlider.value = mediaPlayer.volume;
            }
        });

        // 4. Time Formatting & Progress Updates
        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        mediaPlayer.addEventListener('loadedmetadata', () => {
            progressBar.max = mediaPlayer.duration;
            updateTimeDisplay();
        });

        mediaPlayer.addEventListener('timeupdate', () => {
            if (!progressBar.matches(':active')) {
                progressBar.value = mediaPlayer.currentTime;
            }
            updateTimeDisplay();
        });

        function updateTimeDisplay() {
            const current = formatTime(mediaPlayer.currentTime);
            const total = formatTime(mediaPlayer.duration);
            timeDisplay.textContent = `${current} / ${total}`;
        }

        // 5. Seek Bar Interaction
        progressBar.addEventListener('input', () => {
            mediaPlayer.currentTime = progressBar.value;
        });
    </script>
</body>
</html>
