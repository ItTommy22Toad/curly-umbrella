<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notepad</title>

<style>
body{
    margin:0;
    background:#c0c0c0;
    font-family:Tahoma,Arial,sans-serif;
    overflow:hidden;
}

.menuBar{
    background:#c0c0c0;
    border-bottom:2px solid #808080;
    display:flex;
    padding:2px;
    user-select:none;
}

.menu{
    position:relative;
    padding:4px 10px;
    cursor:pointer;
}

.menu:hover{
    background:#000080;
    color:white;
}

.dropdown{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    background:#c0c0c0;
    border:2px solid white;
    border-right-color:#404040;
    border-bottom-color:#404040;
    min-width:170px;
    z-index:100;
}

.dropdown div{
    padding:6px 10px;
    cursor:pointer;
    color:black;
}

.dropdown div:hover{
    background:#000080;
    color:white;
}

.menu:hover .dropdown{
    display:block;
}

#title{
    padding:6px;
    background:#d4d0c8;
    font-size:13px;
    border-bottom:1px solid gray;
}

textarea{
    width:100%;
    height:calc(100vh - 72px);
    resize:none;
    border:none;
    outline:none;
    padding:10px;
    box-sizing:border-box;
    font-family:Consolas,monospace;
    font-size:15px;
    background:white;
}

.status{
    height:24px;
    background:#d4d0c8;
    border-top:2px solid white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8px;
    font-size:12px;
}

input[type=file]{
    display:none;
}
</style>

</head>
<body>

<div class="menuBar">

<div class="menu">
File
<div class="dropdown">
<div onclick="saveDoc()">Save</div>
<div onclick="upload.click()">Upload</div>
<div onclick="downloadDoc()">Download</div>
<div onclick="renameDoc()">Rename</div>
<div onclick="location.href='exit.html'">Exit</div>
</div>
</div>

<div class="menu">
Edit
<div class="dropdown">
<div onclick="document.execCommand('undo')">Undo</div>
<div onclick="document.execCommand('redo')">Redo</div>
<div onclick="editor.select()">Select All</div>
<div onclick="clearText()">Clear Text</div>
</div>
</div>

</div>

<div id="title">Untitled.txt</div>

<textarea id="editor"></textarea>

<div class="status">
<span id="status">Ready</span>
<span id="counter">0 chars | 0 words</span>
</div>

<input type="file" id="upload" accept=".txt">

<script>

const editor=document.getElementById("editor");
const title=document.getElementById("title");
const status=document.getElementById("status");
const counter=document.getElementById("counter");
const upload=document.getElementById("upload");

let filename=localStorage.getItem("filename")||"Untitled.txt";
title.innerText=filename;

editor.value=localStorage.getItem("text")||"";

updateCounter();

function saveDoc(){
    localStorage.setItem("text",editor.value);
    localStorage.setItem("filename",filename);

    status.innerText="Saved";

    setTimeout(()=>{
        status.innerText="Ready";
    },1000);
}

function downloadDoc(){

    let blob=new Blob([editor.value],{type:"text/plain"});
    let a=document.createElement("a");

    a.href=URL.createObjectURL(blob);
    a.download=filename;

    a.click();

    URL.revokeObjectURL(a.href);

}

upload.onchange=e=>{

let file=e.target.files[0];
if(!file) return;

filename=file.name;
title.innerText=filename;

let reader=new FileReader();

reader.onload=function(ev){

editor.value=ev.target.result;
saveDoc();
updateCounter();

};

reader.readAsText(file);

}

function renameDoc(){

let name=prompt("Document name:",filename);

if(name){

filename=name;
title.innerText=name;
saveDoc();

}

}

function clearText(){

if(confirm("Clear all text?")){

editor.value="";
saveDoc();
updateCounter();

}

}

editor.addEventListener("input",()=>{

updateCounter();

});

function updateCounter(){

let chars=editor.value.length;

let words=editor.value.trim()==""?0:editor.value.trim().split(/\s+/).length;

counter.innerText=chars+" chars | "+words+" words";

}

// Autosave every second

setInterval(saveDoc,1000);

</script>

</body>
</html>
